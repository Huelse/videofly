server {
  listen 80;
  server_name videofly.oini.top;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name videofly.oini.top;

  client_max_body_size 64m;
  index index.html;
  resolver 127.0.0.11 ipv6=off valid=30s;

  ssl_certificate /etc/letsencrypt/live/videofly.oini.top/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/videofly.oini.top/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location /api/ {
    set $api_upstream http://server:3000;
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}
