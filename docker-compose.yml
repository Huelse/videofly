services:
  postgres:
    image: postgres:17-alpine
    container_name: videofly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: videofly
      POSTGRES_USER: videofly
      POSTGRES_PASSWORD: videofly
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
